name: Notify subscribers of new blog post

on:
  push:
    branches: [main]
    paths: ['blog/**']

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send new post to Loops
        env:
          LOOPS_API_KEY: ${{ secrets.LOOPS_API_KEY }}
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'blog/**/*.md' 'blog/**/*.mdx')
          if [ -z "$NEW_FILES" ]; then
            echo "No new blog post, skipping."
            exit 0
          fi

          python3 << 'EOF'
          import os, re, json, urllib.request

          for post_file in os.popen("git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'blog/**/*.md' 'blog/**/*.mdx'").read().split():
              raw = open(post_file).read()

              title = re.search(r'^title:\s*["\']?(.*?)["\']?\s*$', raw, re.M)
              slug  = re.search(r'^slug:\s*(\S+)', raw, re.M)

              payload = json.dumps({
                  'eventName': 'new_blog_post',
                  'eventProperties': {
                      'blogTitle': title.group(1).strip('\'"') if title else '',
                      'blogUrl':   f'https://docs.litellm.ai/blog/{slug.group(1) if slug else ""}',
                  },
              }).encode()

              req = urllib.request.Request(
                  'https://app.loops.so/api/v1/events/send',
                  headers={'Authorization': f'Bearer {os.environ["LOOPS_API_KEY"]}', 'Content-Type': 'application/json'},
                  method='POST',
                  data=payload,
              )
              with urllib.request.urlopen(req) as r:
                  print(r.read().decode())
          EOF
